<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>
  <rect width="900" height="300" fill="url(#bg3)" rx="12"/>

  <text x="450" y="32" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700">How Dr. Agnes Compares</text>
  <text x="450" y="50" text-anchor="middle" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10">Melanoma sensitivity — the most important metric for skin cancer screening</text>

  <!-- Bar chart -->
  <!-- Labels -->
  <text x="190" y="90" text-anchor="end" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11">Dr. Agnes (ours)</text>
  <text x="190" y="130" text-anchor="end" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11">DermaSensor (FDA)</text>
  <text x="190" y="170" text-anchor="end" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11">Best Community Model</text>
  <text x="190" y="210" text-anchor="end" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11">skintaglabs SigLIP</text>
  <text x="190" y="250" text-anchor="end" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11">Hand-crafted features</text>

  <!-- Bars -->
  <!-- DrAgnes: 91.3% -->
  <rect x="200" y="76" width="570" height="22" rx="4" fill="#14b8a6" opacity="0.9"/>
  <text x="780" y="92" fill="#14b8a6" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">91.3%</text>
  <text x="210" y="91" fill="#042f2e" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600">29,540 diverse images | Open source | Runs on phone</text>

  <!-- DermaSensor: 90.2% -->
  <rect x="200" y="116" width="563" height="22" rx="4" fill="#f59e0b" opacity="0.7"/>
  <text x="773" y="132" fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">90.2%</text>
  <text x="210" y="131" fill="#451a03" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600">$7,000 device | FDA-cleared | Proprietary</text>

  <!-- Community: 73.3% -->
  <rect x="200" y="156" width="458" height="22" rx="4" fill="#64748b" opacity="0.6"/>
  <text x="668" y="172" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">73.3%</text>
  <text x="210" y="171" fill="#1e293b" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600">Anwarkh1 ViT-Base | Untested claims</text>

  <!-- SigLIP: 30% -->
  <rect x="200" y="196" width="187" height="22" rx="4" fill="#ef4444" opacity="0.5"/>
  <text x="397" y="212" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">30.0%</text>
  <text x="210" y="211" fill="#1e293b" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600">Misses 70% of melanomas</text>

  <!-- Features: 0% -->
  <rect x="200" y="236" width="3" height="22" rx="2" fill="#ef4444" opacity="0.4"/>
  <text x="213" y="252" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">0%</text>
  <text x="245" y="252" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="9">Hand-crafted CV features alone cannot detect melanoma</text>

  <!-- 90% threshold line -->
  <line x1="763" y1="70" x2="763" y2="265" stroke="#10b981" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <text x="763" y="280" text-anchor="middle" fill="#10b981" font-family="Inter, system-ui, sans-serif" font-size="8" opacity="0.6">90% threshold</text>
</svg>
