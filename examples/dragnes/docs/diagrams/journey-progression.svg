<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="33%" stop-color="#f59e0b"/>
      <stop offset="66%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700">The Journey: From 0% to 91.3% Melanoma Sensitivity</text>
  <text x="450" y="60" text-anchor="middle" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="11">6 stages of iterative development, each building on lessons from the last</text>

  <!-- Y-axis -->
  <line x1="80" y1="80" x2="80" y2="340" stroke="#334155" stroke-width="1"/>
  <text x="30" y="90" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">100%</text>
  <line x1="75" y1="85" x2="80" y2="85" stroke="#334155" stroke-width="1"/>
  <text x="30" y="155" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">75%</text>
  <line x1="75" y1="150" x2="80" y2="150" stroke="#334155" stroke-width="1"/>
  <text x="30" y="220" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">50%</text>
  <line x1="75" y1="215" x2="80" y2="215" stroke="#334155" stroke-width="1"/>
  <text x="30" y="285" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">25%</text>
  <line x1="75" y1="280" x2="80" y2="280" stroke="#334155" stroke-width="1"/>
  <text x="30" y="345" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">0%</text>
  <line x1="75" y1="340" x2="80" y2="340" stroke="#334155" stroke-width="1"/>

  <!-- DermaSensor benchmark line -->
  <line x1="80" y1="108" x2="860" y2="108" stroke="#f59e0b" stroke-width="1" stroke-dasharray="6,4" opacity="0.6"/>
  <text x="865" y="112" fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="9" opacity="0.8">DermaSensor 90.2%</text>

  <!-- Grid lines -->
  <line x1="80" y1="150" x2="860" y2="150" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="80" y1="215" x2="860" y2="215" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="80" y1="280" x2="860" y2="280" stroke="#1e293b" stroke-width="0.5"/>

  <!-- Stage 1: Demo (0%) -->
  <circle cx="170" cy="340" r="8" fill="#ef4444" opacity="0.9"/>
  <text x="170" y="360" text-anchor="middle" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">0%</text>
  <text x="170" y="375" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="9">Demo</text>
  <text x="170" y="387" text-anchor="middle" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="8">RGB averages</text>

  <!-- Stage 2: Features (0%) -->
  <circle cx="290" cy="340" r="8" fill="#ef4444" opacity="0.9"/>
  <line x1="178" y1="340" x2="282" y2="340" stroke="#ef4444" stroke-width="2" opacity="0.5"/>
  <text x="290" y="360" text-anchor="middle" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">0%</text>
  <text x="290" y="375" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="9">Features</text>
  <text x="290" y="387" text-anchor="middle" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="8">20 CV features</text>

  <!-- Stage 3: Community (73.3%) -->
  <circle cx="410" cy="151" r="8" fill="#f59e0b" opacity="0.9"/>
  <line x1="298" y1="340" x2="402" y2="151" stroke="#f59e0b" stroke-width="2" opacity="0.5"/>
  <text x="410" y="142" text-anchor="middle" fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">73.3%</text>
  <text x="410" y="375" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="9">Community</text>
  <text x="410" y="387" text-anchor="middle" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="8">HuggingFace ViT</text>

  <!-- Stage 4: Custom (98.2%) -->
  <circle cx="530" cy="87" r="10" fill="#10b981" opacity="0.9" filter="url(#glow)"/>
  <line x1="418" y1="151" x2="520" y2="87" stroke="#10b981" stroke-width="2" opacity="0.5"/>
  <text x="530" y="78" text-anchor="middle" fill="#10b981" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">98.2%</text>
  <text x="530" y="375" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="9">Focal Loss</text>
  <text x="530" y="387" text-anchor="middle" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="8">HAM10000 only</text>

  <!-- Stage 5: External (61.6%) - THE DROP -->
  <circle cx="650" cy="181" r="8" fill="#ef4444" opacity="0.9"/>
  <line x1="540" y1="87" x2="642" y2="181" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3" opacity="0.7"/>
  <text x="650" y="172" text-anchor="middle" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">61.6%</text>
  <text x="650" y="375" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="9">External Test</text>
  <text x="650" y="387" text-anchor="middle" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="8">REALITY CHECK</text>

  <!-- Arrow showing the crash -->
  <text x="590" y="125" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="9" opacity="0.7" transform="rotate(-35, 590, 125)">-36.6%!</text>

  <!-- Stage 6: Multi-Dataset (91.3%) - THE FIX -->
  <circle cx="770" cy="104" r="12" fill="url(#tealGrad)" opacity="0.95" filter="url(#glow)"/>
  <line x1="658" y1="181" x2="758" y2="104" stroke="#14b8a6" stroke-width="3" opacity="0.7"/>
  <text x="770" y="94" text-anchor="middle" fill="#14b8a6" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700">91.3%</text>
  <text x="770" y="375" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600">Multi-Dataset</text>
  <text x="770" y="387" text-anchor="middle" fill="#14b8a6" font-family="Inter, system-ui, sans-serif" font-size="8">29.5K images</text>

  <!-- Arrow showing recovery -->
  <text x="710" y="155" fill="#14b8a6" font-family="Inter, system-ui, sans-serif" font-size="9" opacity="0.8" transform="rotate(-30, 710, 155)">+29.7%</text>
</svg>
