<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="shieldFill" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#115e59"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="shieldStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="50%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <!-- Skin tone gradient for the area inside the magnifying glass -->
    <radialGradient id="skin" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="70%" stop-color="#c4956a"/>
      <stop offset="100%" stop-color="#b08560"/>
    </radialGradient>
    <!-- Lesion gradient — darker, irregular -->
    <radialGradient id="lesion" cx="45%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#5c3d2e"/>
      <stop offset="60%" stop-color="#4a2f22"/>
      <stop offset="100%" stop-color="#3b2418"/>
    </radialGradient>
    <!-- Glass reflection -->
    <linearGradient id="reflection" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <circle cx="256" cy="256" r="256" fill="#0a0a0f"/>

  <!-- Shield — the frame -->
  <path d="M256 36 L420 140 L420 310 Q420 436 256 484 Q92 436 92 310 L92 140 Z"
        fill="url(#shieldFill)" stroke="url(#shieldStroke)" stroke-width="5"/>

  <!-- Pulse/heartbeat line across the shield -->
  <polyline points="120,260 180,260 200,220 230,300 260,200 290,280 310,240 340,260 392,260"
            fill="none" stroke="#14b8a6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.25"/>

  <!-- === MAGNIFYING GLASS examining skin === -->

  <!-- Skin patch visible through the lens -->
  <clipPath id="lensClip">
    <circle cx="230" cy="210" r="82"/>
  </clipPath>
  <g clip-path="url(#lensClip)">
    <!-- Skin base -->
    <circle cx="230" cy="210" r="82" fill="url(#skin)"/>
    <!-- Subtle skin texture lines -->
    <line x1="160" y1="185" x2="300" y2="185" stroke="#b8845a" stroke-width="0.5" opacity="0.3"/>
    <line x1="160" y1="200" x2="300" y2="200" stroke="#b8845a" stroke-width="0.5" opacity="0.25"/>
    <line x1="160" y1="215" x2="300" y2="215" stroke="#b8845a" stroke-width="0.5" opacity="0.3"/>
    <line x1="160" y1="230" x2="300" y2="230" stroke="#b8845a" stroke-width="0.5" opacity="0.25"/>
    <line x1="200" y1="140" x2="200" y2="280" stroke="#b8845a" stroke-width="0.5" opacity="0.2"/>
    <line x1="230" y1="140" x2="230" y2="280" stroke="#b8845a" stroke-width="0.5" opacity="0.2"/>
    <line x1="260" y1="140" x2="260" y2="280" stroke="#b8845a" stroke-width="0.5" opacity="0.2"/>
    <!-- The lesion — asymmetric, multi-toned (realistic mole) -->
    <ellipse cx="238" cy="208" rx="26" ry="22" fill="url(#lesion)" transform="rotate(-15,238,208)"/>
    <!-- Lesion darker core -->
    <ellipse cx="235" cy="205" rx="14" ry="11" fill="#2d1810" transform="rotate(-10,235,205)" opacity="0.7"/>
    <!-- Lesion edge irregularity — small bumps -->
    <circle cx="218" cy="200" r="6" fill="#4a2f22" opacity="0.6"/>
    <circle cx="255" cy="215" r="5" fill="#4a2f22" opacity="0.5"/>
    <circle cx="228" cy="225" r="4" fill="#5c3d2e" opacity="0.5"/>
  </g>

  <!-- Lens ring -->
  <circle cx="230" cy="210" r="82" fill="none" stroke="url(#glass)" stroke-width="10"/>
  <!-- Glass reflection arc -->
  <path d="M180 165 Q205 145 250 155" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.15"/>

  <!-- Handle -->
  <line x1="290" y1="272" x2="355" y2="337" stroke="url(#glass)" stroke-width="14" stroke-linecap="round"/>
  <!-- Handle shadow -->
  <line x1="292" y1="275" x2="357" y2="340" stroke="#000000" stroke-width="14" stroke-linecap="round" opacity="0.2"/>

  <!-- "MELA" text at the bottom of the shield -->
  <text x="256" y="420" text-anchor="middle" fill="#14b8a6" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="42" font-weight="600" letter-spacing="8">MELA</text>
</svg>
