<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0f172a"/>
  <!-- Shield arc (protection) -->
  <path d="M256 80 C360 80 420 160 420 280 C420 380 340 440 256 460 C172 440 92 380 92 280 C92 160 152 80 256 80Z" fill="none" stroke="#14b8a6" stroke-width="6" opacity="0.3"/>
  <!-- Inner dot (the mole/spot being screened) -->
  <circle cx="256" cy="240" r="60" fill="#14b8a6" opacity="0.15"/>
  <circle cx="256" cy="240" r="30" fill="#14b8a6" opacity="0.3"/>
  <circle cx="256" cy="240" r="12" fill="#14b8a6"/>
  <!-- Scanning ring -->
  <circle cx="256" cy="240" r="90" fill="none" stroke="#14b8a6" stroke-width="3" stroke-dasharray="12 8" opacity="0.5"/>
  <!-- Brand name -->
  <text x="256" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#e2e8f0" letter-spacing="-2">Mela</text>
</svg>
