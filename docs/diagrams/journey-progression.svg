<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" width="1100" height="520">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1100" height="520" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="550" y="40" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700">The Journey: From 0% to 95.97% Melanoma Sensitivity</text>
  <text x="550" y="60" text-anchor="middle" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="11">9 stages of iterative development — every failure documented, every number cited</text>

  <!-- Y-axis -->
  <line x1="70" y1="80" x2="70" y2="340" stroke="#334155" stroke-width="1"/>
  <text x="25" y="90" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">100%</text>
  <line x1="65" y1="85" x2="70" y2="85" stroke="#334155" stroke-width="1"/>
  <text x="25" y="155" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">75%</text>
  <line x1="65" y1="150" x2="70" y2="150" stroke="#334155" stroke-width="1"/>
  <text x="25" y="220" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">50%</text>
  <line x1="65" y1="215" x2="70" y2="215" stroke="#334155" stroke-width="1"/>
  <text x="25" y="285" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">25%</text>
  <line x1="65" y1="280" x2="70" y2="280" stroke="#334155" stroke-width="1"/>
  <text x="25" y="345" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">0%</text>
  <line x1="65" y1="340" x2="70" y2="340" stroke="#334155" stroke-width="1"/>

  <!-- DermaSensor benchmark line -->
  <line x1="70" y1="108" x2="1060" y2="108" stroke="#f59e0b" stroke-width="1" stroke-dasharray="6,4" opacity="0.6"/>
  <text x="1065" y="112" fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="9" opacity="0.8">DermaSensor 90.2%</text>

  <!-- Grid lines -->
  <line x1="70" y1="150" x2="1060" y2="150" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="70" y1="215" x2="1060" y2="215" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="70" y1="280" x2="1060" y2="280" stroke="#1e293b" stroke-width="0.5"/>

  <!-- Stage 1: Demo (0%) -->
  <circle cx="130" cy="340" r="7" fill="#ef4444" opacity="0.9"/>
  <text x="130" y="360" text-anchor="middle" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700">0%</text>
  <text x="130" y="375" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="8">S1: Demo</text>
  <text x="130" y="387" text-anchor="middle" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="7">RGB averages</text>

  <!-- Stage 2: Features (0%) -->
  <circle cx="230" cy="340" r="7" fill="#ef4444" opacity="0.9"/>
  <line x1="137" y1="340" x2="223" y2="340" stroke="#ef4444" stroke-width="2" opacity="0.5"/>
  <text x="230" y="360" text-anchor="middle" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700">0%</text>
  <text x="230" y="375" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="8">S2: Features</text>
  <text x="230" y="387" text-anchor="middle" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="7">20 CV features</text>

  <!-- Stage 3: Community (73.3%) -->
  <circle cx="330" cy="151" r="7" fill="#f59e0b" opacity="0.9"/>
  <line x1="237" y1="340" x2="323" y2="151" stroke="#f59e0b" stroke-width="2" opacity="0.5"/>
  <text x="330" y="142" text-anchor="middle" fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700">73.3%</text>
  <text x="330" y="375" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="8">S3: Community</text>
  <text x="330" y="387" text-anchor="middle" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="7">HuggingFace ViT</text>

  <!-- Stage 4: Custom (98.2%) -->
  <circle cx="430" cy="87" r="9" fill="#10b981" opacity="0.9" filter="url(#glow)"/>
  <line x1="337" y1="151" x2="421" y2="87" stroke="#10b981" stroke-width="2" opacity="0.5"/>
  <text x="430" y="78" text-anchor="middle" fill="#10b981" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">98.2%</text>
  <text x="430" y="375" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="8">S4: Focal Loss</text>
  <text x="430" y="387" text-anchor="middle" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="7">HAM10000 only</text>

  <!-- Stage 5: External (61.6%) - THE DROP -->
  <circle cx="530" cy="181" r="7" fill="#ef4444" opacity="0.9"/>
  <line x1="439" y1="87" x2="523" y2="181" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3" opacity="0.7"/>
  <text x="530" y="172" text-anchor="middle" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700">61.6%</text>
  <text x="530" y="375" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="8">S5: External</text>
  <text x="530" y="387" text-anchor="middle" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="7">REALITY CHECK</text>

  <!-- Arrow showing the crash -->
  <text x="478" y="125" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="8" opacity="0.7" transform="rotate(-35, 478, 125)">-36.6%!</text>

  <!-- Stage 6: Combined Training (95.97%) - THE FIX -->
  <circle cx="630" cy="95" r="10" fill="url(#tealGrad)" opacity="0.95" filter="url(#glow)"/>
  <line x1="537" y1="181" x2="620" y2="95" stroke="#14b8a6" stroke-width="3" opacity="0.7"/>
  <text x="630" y="85" text-anchor="middle" fill="#14b8a6" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">95.97%</text>
  <text x="630" y="375" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600">S6: Combined</text>
  <text x="630" y="387" text-anchor="middle" fill="#14b8a6" font-family="Inter, system-ui, sans-serif" font-size="7">37.5K images</text>

  <!-- Arrow showing recovery -->
  <text x="580" y="148" fill="#14b8a6" font-family="Inter, system-ui, sans-serif" font-size="8" opacity="0.8" transform="rotate(-32, 580, 148)">+34.4%</text>

  <!-- Stage 7: Ensemble (99.4%) -->
  <circle cx="730" cy="82" r="10" fill="#10b981" opacity="0.95" filter="url(#glow)"/>
  <line x1="640" y1="95" x2="720" y2="82" stroke="#10b981" stroke-width="2" opacity="0.6"/>
  <text x="730" y="73" text-anchor="middle" fill="#10b981" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700">99.4%</text>
  <text x="730" y="375" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600">S7: Ensemble</text>
  <text x="730" y="387" text-anchor="middle" fill="#10b981" font-family="Inter, system-ui, sans-serif" font-size="7">V1+V2 combined</text>

  <!-- Stage 8: Threshold (88.4%) -->
  <circle cx="830" cy="115" r="8" fill="url(#goldGrad)" opacity="0.9"/>
  <line x1="740" y1="82" x2="822" y2="115" stroke="#f59e0b" stroke-width="2" stroke-dasharray="3,2" opacity="0.6"/>
  <text x="830" y="106" text-anchor="middle" fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700">88.4%</text>
  <text x="830" y="375" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="8">S8: Threshold</text>
  <text x="830" y="387" text-anchor="middle" fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="7">91.1% specificity</text>

  <!-- Stage 9: ONNX Deploy -->
  <circle cx="930" cy="115" r="10" fill="#818cf8" opacity="0.9" filter="url(#glow)"/>
  <line x1="838" y1="115" x2="920" y2="115" stroke="#818cf8" stroke-width="2" opacity="0.5"/>
  <text x="930" y="106" text-anchor="middle" fill="#a5b4fc" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700">ONNX</text>
  <text x="930" y="375" text-anchor="middle" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600">S9: Deploy</text>
  <text x="930" y="387" text-anchor="middle" fill="#818cf8" font-family="Inter, system-ui, sans-serif" font-size="7">85MB, 22ms, offline</text>

  <!-- CI annotation on S6 -->
  <text x="630" y="115" text-anchor="middle" fill="#5eead4" font-family="Inter, system-ui, sans-serif" font-size="7" opacity="0.8">95% CI: 94.5%-97.4%</text>

  <!-- Bottom annotations -->
  <rect x="70" y="405" width="1000" height="100" rx="8" fill="#1e293b" opacity="0.5"/>

  <!-- FDA audit annotation -->
  <rect x="85" y="415" width="8" height="8" rx="2" fill="#ef4444" opacity="0.8"/>
  <text x="100" y="423" fill="#fca5a5" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600">FDA audit corrected fabricated claims</text>
  <text x="100" y="436" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="8">Previous "91.3% cross-dataset" and "96.2% sensitivity" were not backed by evidence. Overnight 3.3h retraining produced real numbers.</text>

  <!-- AUROC annotation -->
  <rect x="85" y="449" width="8" height="8" rx="2" fill="#14b8a6" opacity="0.8"/>
  <text x="100" y="457" fill="#5eead4" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600">AUROC 0.960 on external data — threshold problem, not discrimination</text>
  <text x="100" y="470" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="8">The model's ranking ability is strong (AUROC 0.960). Lower accuracy reflects deliberate threshold tuning for sensitivity over specificity.</text>

  <!-- Fitzpatrick annotation -->
  <rect x="85" y="483" width="8" height="8" rx="2" fill="#f59e0b" opacity="0.8"/>
  <text x="100" y="491" fill="#fbbf24" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600">Fitzpatrick equity: 30pp gap disclosed</text>
  <text x="100" y="504" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="8">Testing revealed DANGEROUS 30-percentage-point performance gaps across skin tones. Training data is ~95% Fitzpatrick I-III. Not yet resolved.</text>
</svg>
